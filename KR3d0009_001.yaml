body:
  text: 野菜博錄卷一明鮑山撰草部大藍一名菘藍一名葳馬藍人家園圃中苖高尺餘葉類白菜葉㣲厚狹窄尖淡粉青色莖稍間開黄花結小莢其子黑色味苦性寒無毒食法葉煠熟水浸去苦味油鹽調食大薊苗高三四尺莖五稜葉似大花苦苣菜葉莖葉多刺葉中心開花淡紫色味苦性平無毒根有毒食法嫩苗葉煠熟水淘去苦味油鹽調食刺薊菜本草名小薊俗名千針草處處有之苗高尺餘葉似苦苣葉莖葉俱有刺葉中心出花頭如紅藍花青紫色葉味甘性凉無毒食法採嫩苗葉煠熟水浸淘浄油鹽調食山莧菜本草一名牛膝一名百倍一名脚斯蹬一名對節菜苗高二尺莖方青紫色葉對節生如牛膝状葉似莧菜葉皆對生開花作穗根味苦酸性平無毒葉味甘㣲酸食法採苗葉煠熟換水浸去酸味淘浄油鹽調食兎兒絲生田野中其苗就地拖蔓節間生葉如指頂大葉邉似雲頭様開小黄花苗葉味甜食法採苗葉煠熟水浸油鹽調食粉條兒菜生田野中其葉初生就地叢生長則四散分垂葉似萱草葉痩細㣲短葉間攛葶開淡黄花葉味甜食法採葉煠熟淘洗浄油鹽調食歪頭菜生山野中細莖就地叢生葉似豇豆葉而窄長皆㣲白色兩葉並生一處開紫紅花結角兒比豌豆角匾小葉味甜食法採葉煠熟油鹽調食紅花菜本草名紅藍花一名黄藍處處有之苖高二尺許莖葉有刺似刺薊葉而潤梢結捄彚亦多刺開紅花蕊出捄上花可染真紅葉味甘無毒食法採嫩苖葉煠熟油鹽調食子可笮油用舌頭菜生山野中苗葉搨地生葉似山白菜葉小頭頗團葉面不雛比山白菜葉亦厚味苦食法採葉煠熟水浸去苦味換水淘浄油鹽調食匙頭菜生山野中作小科苗其莖面窊背圓葉似團匙頭様有如杏葉大邉㣲鋸齒開花淡紅色結子黄褐色其葉味甘食法採葉煠熟水浸淘浄油鹽調食蛇葡萄生荒野中拖蔓而生葉似菊葉花叉多碎莖葉間開五瓣小銀褐花結子如豌豆大生青熟則紅葉味甜食法採葉煠熟換水浸淘浄油鹽調食水蓑衣生水邉葉似地稍𤓰葉窄小毎葉間皆結小青蓇葖葉味苦食法採苗葉煠熟水浸淘去苦味油鹽調食拖白練苗生田野中苗搨地生葉似垂盆草葉而小葉間開小白花結細黄子葉味甜食法採苗葉煠熟油鹽調食酸桶笋生山野間初發笋葉後分生莖叉科苗高四五尺莖似水葒莖紅赤色葉似白槿葉而澁紋脉亦粗味甘㣲酸食法採嫩笋葉煠熟水浸去邪味淘浄油鹽調食甌菜生山野中就地作小科苗莖方葉似山莧菜葉有鋸齒味甜食法採嫩苖葉煠熟水浸淘浄油鹽調食和尚菜生田野中初搨地布葉葉似野天茄兒葉却大背㣲紅紫色後攛苖高二三尺結子如灰菜子六葉味辛酸㣲鹹食法採嫩葉煠熟換水浸去邪味油鹽調食鹿蕨菜生山野中苗高一尺許葉莖背圓面窊葉似胡蘿苩葉亦肥硬味甜食法採苗葉煠熟水浸淘浄油鹽調食山芹菜生山野間苗高一尺餘葉似野蜀葵葉稍大有五叉葉中攛生莖叉梢結刺毬如䑕粘子下開黲白花葉味甘食法採苗葉煠熟水浸淘浄油鹽調食胡蒼耳又名回回蒼耳生田野中葉似皂莢葉㣲長大色㣲淡緑莖有線楞結實如蒼耳實稍尖長葉味㣲苦食法採嫩苗葉煠熟水浸去苦味淘浄油鹽調食水胡蘆苗生水邉就地拖蔓而生毎節間生四葉如指頂大其葉尖上皆作三叉味甘食法採葉連嫩秧煠熟水浸淘浄油鹽調食馬蘭頭本草名馬蘭苗高一二尺莖亦紫色葉似薄荷葉邉皆有鋸齒又似地𤓰兒葉㣲大味辛性平無毒食法採嫩苗葉煠熟新汲水浸去辛味洗浄油鹽調食蛇牀子一名蛇粟一名蛇米一名虺牀一名思益一名繩毒一名棗棘一名牆蘼苗高二三尺作叢似蒿枝葉似藁本葉枝上有花頭百餘結開白花如傘結子半黍大黄褐色味苦辛丼性平無毒食法採嫩葉煠熟水浸淘浄油鹽調食山萮菜生山野中苗初搨地生莖葉背圓面窊葉似初出冬蜀葵葉小有花叉鋸齒邉後攛莖叉莖色深紫梢葉頗小味㣲辣食法採苗葉煠熟換水浸淘浄油鹽調食米蒿生田野中苗高尺許葉似園荽葉㣲細葉叢間分生莖又梢上開小青黄花結小細角似葶藶角兒葉味㣲苦食法採嫩苗葉煠熟水浸過淘浄油鹽調食珍珠菜生山野中苗高二尺許莖似蒿稈㣲帶紅色其葉状似栁葉極細小梢頭出穗類䑕尾草穗開白花結子小如菉豆粒黄褐色葉味苦澁食法採葉煠熟換水浸去澁味淘浄油鹽調食風輪菜生山野中苗高二尺餘方莖四楞色淡緑㣲白葉似荏子葉小邉有鋸齒叉兩葉對生葉節間又四小葉相攅對生開淡粉紅花葉味苦食法採葉煠熟水浸去苦味淘浄油鹽調食凉蒿菜又名丼菊芽生山野中葉似菊花葉細長尖多花叉開黄花葉味甘食法採葉煠熟換水浸淘浄油鹽調食葛公菜生山谷間苗高二三尺莖方窊面四楞對分莖叉葉亦對生葉似蘇子葉小梢間開粉紅花結子如小米粒茶褐色葉味甜㣲苦食法採葉煠熟水浸去苦味淘浄油鹽調食八角菜生山野中苗高一尺許苗莖甚細其葉状類牡丹葉大味甜食法採嫩苗葉煠熟水浸淘浄油鹽調食螺黶兒一名地桑一名痢兒草生荒野中莖㣲紅葉似野人莧葉㣲長窄尖開花作赤色小細穗兒其葉味甘食法採苗葉煠熟水浸淘去邪味油鹽調食婆婆納生田野中苗搨地生葉最小如小面花壓兒状類初生菊花芽葉又團邉㣲花如雲影様味甜食法採苗葉煠熟水浸淘浄油鹽調食節節菜生荒野中濕地科苗甚小葉似􅜮蓬又更細小稀疎其莖多節堅硬葉間開粉紫花味甜食法採嫩苗㨂擇浄煠熟水浸過油鹽調食野艾蒿生田野中苗葉類艾而細又多花叉葉有艾香味苦食法採葉煠熟水淘去苦味油鹽調食堇堇菜一名箭頭草生田野中苗初搨地生葉似鈹箭頭様葉蒂甚長葉間攛葶開紫花結三瓣蒴兒中有子如芥菜子食法採苗葉煠熟水浸淘浄油鹽調食地槐菜一名小蟲兒麥生荒野中苗高四五寸葉似石竹子葉極細短開小黄白花結小黒子葉味甜食法採葉煠熟水浸淘浄油鹽調食老鸛筋生田野中就地拖秧而生莖㣲紫色莖叉繁稠葉似園荽葉而短小頭不尖葉間開五瓣小黄花味甜食法採嫩苗葉煠熟水浸去邪味淘洗浄油鹽調食金剛刺又名老君鬚生山野間科條高四五尺似刺䕷花條其上多刺葉似牛尾菜葉大葉間生細絲蔓葉味甘食法採葉煠熟水浸淘浄油鹽調食狗筋蔓生山野間小科就地拖蔓生葉似月芽菜葉㣲尖多紋脉兩葉對生葉梢間開白花葉味苦食法採葉煠熟水浸陶去苦味油鹽調食耐驚菜一名旱蓮草生于濕地中苗高一尺餘莖紫赤色對生莖叉葉似金鳯花葉㣲長梢間開細瓣白花淡黄心葉味苦食法採苗葉煠熟油鹽調食地棠菜生山野中苗高一二尺葉似初生芥菜㣲窄尖味甜食法採嫩苗葉煠熟油鹽調食蚵蚾菜生山野中科苗二三尺許葉似連翹葉㣲長又似金銀花葉尖紋皺却少邉有小鋸齒開粉紫花黄心葉味甜食法採嫩苗葉煠熟水浸淘洗浄油鹽調食野粉團兒生田野中苗高一二尺莖似鐵桿蒿莖葉似獨掃葉小上下稀疎枝頭分叉開淡白花黄心味甜辣食法採嫩苗葉煠熟水浸淘浄油鹽調食金盞兒花苗高四五寸葉似初生萵苣葉比萵苣葉狹窄厚抪莖生葉莖端開金黄色盞子様花其葉味酸食法採苗葉煠熟水浸去酸味淘浄油鹽調食鹻蓬一名鹽蓬生水傍下濕地莖似落藜亦有線楞葉似蓬肥壮比蓬葉亦稀疎莖葉間結青子極細小其葉味㣲醎性㣲寒食法採苗葉煠熟水浸去醎味淘浄油鹽調食虎尾草生山野中科苗高二三尺莖圓葉似栁葉亦痩短葉皆抪莖生味甜㣲澁食法採嫩苗葉煠熟換水淘去澁味油鹽調食野蜀葵生荒野中就地叢生苗高五寸許葉似葛勒子秧葉厚大味辣食法採嫩葉煠熟水浸淘浄油鹽調食鬰臭苗即茺蔚子一名益母一名益明生田野間葉似艾葉薄小色青莖方節節開小白花結子茶褐色三稜細長味辛甘㣲温無毒食法採苗葉煠熟水浸淘浄油鹽調食酸漿草本草名酢漿草一名鳩酸草生田野及道傍葉如初生小水萍毎莖叢生三葉開黄花結黑子味酸性寒無毒食法採嫩苗葉生食山芥菜生山野中苗高一二尺葉似家芥菜葉痩短㣲尖多花叉開小黄花結小短角兒味辣㣲甜食法採嫩苗葉揀擇浄煠熟油鹽調食紫香蒿生平野中苗高一二尺莖方紫色葉似邪蒿葉背白莖葉梢間結小青子比灰菜子小葉味苦食法採葉煠熟水浸去苦味油鹽調食鷄兒腸生田野中苗高一二尺莖黑紫色葉似薄荷葉㣲小邉有稀鋸齒又似六月菊梢葉間開細瓣淡粉紫花黄心葉味㣲辣食法採葉煠熟換水淘去辣味油鹽調食雨㸃兒菜生田野中就地叢生其莖脚紫梢青葉如細栁葉窄小抪莖生又似石竹子葉頗硬梢間開小尖五瓣紫花結角比蘿蔔角又大其葉味甘食法採葉煠熟水浸作過淘洗令浄油鹽調食小蟲兒卧單一名鐵線草生田野中苗搨地生葉似苜蓿葉極小其莖色紅開小紅花苗葉味甜食法採苗葉煠熟水浸淘浄油鹽調食野西𤓰苗俗名秃漢頭生田野中苗高尺餘葉似家西𤓰葉頗小硬葉間生蒂開五瓣銀褐色紫心黄蕊花罷作蒴内結實如楝子大苗葉㣲苦食法採嫩苗葉煠熟水浸去邪味淘過油鹽調食草零陵香一名芫香人家園圃中亦種之葉似苜蓿葉長㣲尖莖葉間開淡粉紫花作小短穗其子小如粟粒苗葉味苦性平食法採苗葉煠熟換水淘浄油鹽調食水落藜生水邉處處有之苗高尺餘莖色㣲紅葉似野灰菜葉痩小味㣲苦澁性凉食法採苗葉煠熟換水浸淘浄油鹽調食或曬乾煠食尤可獨行菜又名麥稭菜生田野中科苗高一尺許葉似水棘針葉㣲短小作瓦隴様梢出細葶開小黲白花結小青蓇葖如小菉豆粒葉味甜食法採嫩苗葉煠熟換水淘浄油鹽調食山蓼生山野間苗高一二尺葉似芍藥葉長細窄開碎瓣白花葉味㣲辣食法採嫩葉煠熟換水浸去辣氣作成黄色淘洗浄油鹽調食野菜博録卷一
