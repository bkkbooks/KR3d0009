body:
  text: 野菜博錄卷二明鮑山撰草部野茴香生田野中苗初生搨地葉似蒿葉細小于葉間攛葶分生莖叉梢頭開黄花結細角有小黒子葉味苦食法採苗葉煠熟水浸淘去苦味油鹽調食野同蒿生荒野中苗高二三尺莖紫赤色葉㣲青黄色形似初生松針而茸細味苦食法採嫩苗葉煠熟換水浸淘浄油鹽調食前胡苗高一二尺青白色似斜蒿味甚香美葉似野菊葉痩細頗似山蘿蔔葉又似芸蒿開黲白花類蛇牀子花秋間結實根細青紫色味甘辛㣲苦性㣲寒無毒食法採葉煠熟換水浸淘浄油鹽調食透骨草一名天芝蔴生荒野中苗高三四尺莖方窊面四楞其莖脚紫對節分生莖叉葉似䕡蒿葉多花叉葉皆對生莖節間攅開粉紅花結子似胡麻子葉味苦食法採嫩苗葉煠熟水浸去苦味淘浄油鹽調食絞股藍生田野中延蔓而生葉似小藍葉短小軟薄邉有鋸齒淡緑色五葉攅生一處開小黄花又有白花者結子如豌豆大生青熟紫黑色葉味甜食法採葉煠熟水浸去邪味涎沫淘洗浄油鹽調食雞腸菜生荒野中苗高二尺許莖方紫色其葉對生葉似小灰菜葉㣲匾開粉紅花結碗子蒴兒葉味甜食法採苗葉煠熟水淘浄油鹽調食水蘇子生于濕地莖淡紫色對生莖叉葉亦對生葉似地𤓰葉而窄邉有花鋸齒三尖叉葉梢間開深黄色花葉味辛食法採苗葉煠熟油鹽調食鵝兒腸生田野水澤邉就地妥莖而生對節生葉葉似􅀈豆葉㣲薄葉間分生枝叉開白花結子似葶藶子葉味甜食法採苗葉煠熟油鹽調食六月菊生田野中苗高一二尺莖似鐵捍蒿莖葉似雞兒腸葉但長而澁又似馬蘭頭葉硬短梢葉間開淡紫花葉味㣲酸澁食法採葉煠熟水浸去邪味油鹽調食費菜生山野間苗高尺許葉似火燄草葉小頭頗齊上有鋸齒其葉抪莖生葉梢上開五瓣小尖淡黄色結五瓣紅小花蒴兒苗葉味酸食法採嫩苗葉煠熟淘去酸味油鹽調食紫雲菜生山野中苗高一二尺莖方紫色對節生叉葉似山小菜葉頗長抪梗對生葉間開淡紫花其葉味㣲苦食法採嫩苗葉煠熟水浸去苦味油鹽調食鴉蔥生田野中板葉尖長搨地而生葉似初生回回蒜葉其葉邉皆曲皺葉中攛葶上結小蓇葖後出白英味㣲辛食法採嫩葉煠熟油鹽調食水棘針苗又名山油子生田野中苗高一二尺莖方四楞對分莖叉葉亦對生葉似荆葉有軟鋸齒尖莖葉紫緑色開小紫碧花葉味辛辣㣲甜食法採苗葉煠熟水淘洗浄油鹽調食沙蓬又名雞爪菜生田野中苗高一尺餘初就地生後分莖叉莖有細線楞葉似獨掃葉窄厚莖梢間結小青子如粟粒小葉味甘性温食法採苗葉煠熟水浸淘浄油鹽調食川芎一名芎藭一名胡窮一名香果一名靡蕪一名薇蕪一名茳蘺苗葉似芹葉㣲細又似白芷葉亦細又如園荽葉叉開白花味辛甘性温無毒食法採葉煠熟換水浸去辛味淘浄油鹽調食防風一名銅芸一名茴草一名屏風根上黄色與蜀葵根相類梢紐短莖葉俱青緑色似青蒿葉濶大莖似茴香開細白花結實似胡荽子味甘辛性温無毒食法採嫩苗葉作菜茹煠食極爽口野生薑本草名劉寄奴生山野中莖似艾蒿長二三尺餘葉似菊葉痩尖開花白色結實黄白色作細筒子蒴兒葉味苦性温無毒食法採嫩葉煠熟水浸淘去苦味油鹽調食水辣菜生水邉濕地中苗高尺餘莖圓葉似鷄兒腸葉頭㣲齊短其葉抪莖生梢間出穗如黄蒿穗其葉味辣食法採嫩苗葉煠熟換水淘去辣氣油鹽調食生亦可食變豆菜生山野中其苗葉初作地攤科生葉似地牡丹葉極大五花叉鋸齒尖其後葉中分生莖叉梢葉頗小上開白花葉味甘食法採葉煠熟作成黄色換水淘浄油鹽調食委陵菜一名飜白菜苗搨地生分莖叉上有白毛葉類柏葉濶邉有鋸齒面青背白又類鹿蕨葉梢間開五瓣黄色葉味苦㣲辣食法採苗葉煠熟水浸淘浄油鹽調食麥藍菜生田野中莖葉俱深萵苣色葉似大藍稍葉小頗尖其葉抱莖對生毎一葉間攛生一叉莖叉梢頭開小肉紅花結蒴有子似小桃紅子苗葉味㣲苦食法採嫩苗葉煠熟水浸淘浄油鹽調食白蒿生荒野中苗高二三尺葉似細絲似初生松針色㣲青白稍似艾香味微辣食法採嫩苗葉煠熟換水浸淘浄油鹽調食龍膽草一名陵游一名草龍膽根類牛膝一本十餘莖黄白色宿根苗高尺餘葉似栁葉細短又似小竹開花如牽牛花青碧色似小鈴形様味苦性大寒無毒食法採葉煠熟換水浸淘去苦味油鹽調食猪牙菜一名角蒿一名莪蒿一名蘿蒿一名䕲蒿生田野中苗高一二尺莖葉如青蒿葉似邪蒿葉細又似蛇牀子葉頗壮梢間開花紅赤色亦似王不留行子味辛苦性寒無毒食法採嫩苗莖葉煠熟水浸去苦味油鹽調食款冬花一名槖吾一名顆東一名虎鬚一名菟奚一名氐冬莖青㣲帶紫色葉似葵葉大叢生又似石葫蘆葉開黄花根紫色葉味苦花味辛甘性温無毒食法嫩葉煠熟水浸淘去苦味油鹽調食萹蓄一名萹竹苗似石竹葉㣲濶嫩緑赤莖如釵股節間花出甚細淡桃紅色結小細子根如蒿根苗葉味苦性平無毒食法苗葉煠熟水浸淘浄油鹽調食薄荷一名鷄蘇莖方葉似荏子葉小頗細長開細碎黲白花其根經冬不死至春發苗味辛苦性温無毒食法採苗葉煠熟換水浸去辣味油鹽調食苜蓿苗高尺餘細莖分叉生葉似錦鷄兒花葉㣲長毎三葉攅生一處梢間開紫花結彎角兒中有子如黍米大味苦性平無毒食法採嫩苗葉煠熟油鹽調食漏蘆一名野蘭一名莢蒿根一名鹿驪根一名鬼油麻苗葉就地叢生葉似山芥菜葉又似白屈菜葉葉中攛葶上開紅白花根苗味苦醎性大寒無毒食法採葉煠熟水浸淘去苦味油鹽調食仙靈脾本草名滛羊藿俗呼三枝九葉草生山野中苗高二尺許莖似小豆莖極細堅葉似杏葉頗長近蒂皆一缺梢間開白色花亦有紫花俱細小葉味辛性寒無毒食法採嫩葉煠熟水浸去邪味淘浄油鹽調食桔梗一名利如一名房圖一名白藥一名梗草一名薺苨根如手指大黄白色春生苗莖高尺餘葉似杏葉長橢四葉相對生開花紫碧色頗似牽牛花秋後結子根葉味辛苦性㣲温有小毒食法採葉煠熟換水浸去苦味淘洗浄油鹽調食連翹一名異翹一名折根一名軹一名三亷苗高三四尺莖赤色葉如榆葉大邉㣲細鋸齒似金銀花葉梢開花黄色結房似梔子味苦性平無毒食法採嫩葉煠熟換水浸去苦味淘浄油鹽調食婆婆指甲菜生田野中作地攤科生莖細弱葉像女人指甲又似初生棗葉㣲薄細莖梢間結小花蒴苗葉味甘食法採嫩苗葉煠熟油鹽調食馬兜鈴一名雲南根一名土青木香苗如藤蔓葉如山藥葉厚大背白開黄紫花頗類枸杞花結實如鈴味苦性寒食法採葉煠熟用水浸去苦味淘浄油鹽調食後庭花一名鴈来紅人家園圃多種之葉似人莧葉其葉中心紅色又有黄色相間亦有通身紅色者亦有紫色者莖葉間結實比莧實㣲大其葉衆葉攅聚状如花朶其色嬌紅可愛故以名之味甜㣲澁性凉食法採苗葉煠熟水浸淘浄油鹽調食芸臺菜今處處有葉似菠菜葉菠菜葉下兩傍多兩叉開黄花結角似蔓菁角有子如小芥子大味辛性温無毒經冬根不死辟蠧食法採苗葉煠熟水浸淘洗油鹽調食鯽魚鱗苗高一二尺莖方茶褐色對分莖叉葉亦對生葉似鷄腸菜葉頗大又似桔梗葉㣲軟葉面紋皺梢間開粉紅花結子如小粟粒茶褐色葉味甜食法採葉煠熟水浸淘浄油鹽調食青莢兒菜生山野中苗高二尺許對生莖叉葉亦對生其葉面青背白鋸齒三叉葉脚葉花叉頗大状似荏子葉狹長尖􅕏莖葉梢間開五瓣小黄花衆花攅開形如穗状其葉味㣲苦食法採嫩苗葉煠熟換水浸淘去苦味油鹽調食苦蕒菜俗名老鸛菜生田野中人家園圃種者為家苦蕒脚葉似白菜葉抪莖生梢葉似鴉嘴形每葉間分叉攛葶如穿葉状梢間開黄花味㣲苦性冷無毒食法採苗葉煠熟水淘浄油鹽調食莙薘菜所在有之人家園圃中多種苗葉搨地生葉類白菜短葉莖亦窄葉頭稍團形状似麋匙様味醎性平寒㣲毒食法採苗葉煠熟洗浄油鹽調食山白菜生山野中苗葉似家白菜葉莖細長其葉尖大邉有鋸齒叉味甜㣲苦食法採苗葉煠熟水淘浄油鹽調食南芥菜人家園圃中本種苗初搨地生後攛葶叉葉似芥菜葉小有毛澁莖葉梢頭開淡黄花結小尖角兒葉味辛辣食法採苗葉煠熟水浸淘去澁味油鹽調食􆆥牛兒苗一名鬭牛兒苗生田野中就地拖秧生莖蔓細弱莖紅紫色葉似園荽葉痩開五瓣小紫花結青蓇葖兒上有一嘴甚尖銳如細錐子状葉味㣲苦食法採葉煠熟換水浸去苦味淘浄油鹽調食毛女兒菜生山中苗高一尺許葉似綿糸菜葉㣲尖又似兎尾兒葉小莖葉皆有白毛梢間開淡黄花如大黍味甘無毒食法採苗葉煠熟水浸淘浄油鹽調食山小菜生山野中科苗高二尺餘就地叢生葉似酸漿子葉窄小面有細紋脉邉有鋸齒色深緑又似桔梗葉頗長􅕏味苦食法採葉煠熟水浸淘去苦味油鹽調食小桃紅一名鳯仙花一名夾竹桃一名海蒳一名染指甲草今處處有之苗高二尺許葉似桃葉窄邉有細鋸齒開紅花結實形類桃様極小有子似蘿蔔子取之易迸北諍切散俗名急性子葉食法採苗葉煠熟水浸一宿做菜油鹽調食黄芪一名戴槮一名戴椹一名獨椹一名芰草一名蜀脂一名百本一名王孫根長二三尺獨莖叢生枝􅗰其葉扶疎羊齒状似槐葉小叉似蒺藜葉濶青白色開黄紫花如槐花結小尖角味甘性㣲温無毒食法採嫩苗葉煠熟換水浸淘去苦味油鹽調食威靈仙一名能消苗高一二尺莖方四稜莖多細茸白毛似栁葉邉有鋸齒似旋覆花葉毎層六七葉相對生排如車輪様有六七層花淺紫色或碧白色作穗似蒲臺子似菊花頭結實青色葉味苦性温無毒食法採葉煠熟換水浸去苦味淘浄油鹽調食地花菜一名墓頭灰生山野中苗高尺餘葉似野萄花葉窄細又似䑕尾草葉亦痩細梢葉間開五瓣小黄花其葉味㣲苦食法採葉煠熟水浸淘洗浄油鹽調食耬斗菜生山野中小科苗就地叢生苗高一尺許莖梗細弱葉似牡丹葉小其頭頗團味甜食法採葉煠熟水浸淘浄油鹽調食青杞一名蜀羊泉一名羊泉一名羊􅀈一名漆姑生田野中苗高二尺餘葉似菊葉稍長開紫色花子類枸杞子生青熟紅根如逺志無心有槮葉味苦性㣲寒無毒食法採嫩葉煠熟水浸去苦味淘浄油鹽調食車輪子即車前子一名芣苢一名蝦蟇衣處處有之初生苗葉抪地如匙面累年者長尺餘似玉簮花葉大葉叢中攛葶三四莖作長穗如䑕尾花甚密結實如葶藶子赤黑色葉味甘性寒無毒食法採嫩苗葉煠熟水浸去涎沫淘浄油鹽調食金盞菜一名地冬𤓰菜生田野中苗高二三尺莖初㣲赤有線路葉似綿栁葉㣲厚抪莖生莖葉稠密開花紫色黄心其葉味甘㣲鹹食法採苗葉煠熟水淘浄油鹽調食泥胡菜生田野中苗高一二尺莖梗繁多葉似水芥菜葉頗大花叉甚深又似風花菜葉却比短小葉中攛葶分生莖叉梢間開淡紫花似刺薊花苗葉味辣食法採嫩苗葉煠熟水浸淘浄油鹽調食狶薟一名粘糊菜一名火杴草苗高三四尺葉似金稜銀線素根紫稭莖叉對節生莖葉頗類蒼耳紋脉豎直梢葉間開花深黄色又有一種苗葉似芥葉尖狹開花如菊結實頗似鶴蝨科苗味苦性寒有毒食法採嫩葉煠熟水浸去苦味淘浄油鹽調食澤瀉一名水䓠一名水瀉一名芒芋一名鵠瀉苗葉似牛舌草紋脉豎直葉叢中攛葶對分莖叉有線榜梢間開三瓣小白花結細子味甘葉味㣲鹹俱無毒食法採嫩葉煠熟水浸淘浄油鹽調食旋覆花一名戴椹一名金沸草一名盛椹一名金錢花苗多近水傍初生大如紅花葉無刺苗長二三尺葉似栁葉稍寛大莖細如蒿􅗰開花如菊花如銅錢大深黄色花味鹹甘性温㣲冷有毒葉味苦性凉食法採葉煠熟水浸去苦味淘浄油鹽調食風花菜生田野中苗高二尺餘葉似芥菜葉痩長又多花叉梢間開黄花如菜花味辛㣲苦食法採嫩苗葉煠熟換水後淘去苦味油鹽調食花蒿生荒野中苗葉就地叢生葉長三四寸四散分垂葉似獨掃葉長硬其頭頗齊㣲有毛澁味㣲辛食法採葉煠熟水浸淘浄油鹽調食獾耳菜生平野中苗長尺餘莖多枝叉其莖上有細線楞葉似竹葉短小亦軟又似萹蓄葉頗濶大又尖莖葉俱有㣲毛開小黲白花結細子苗葉味甘食法採嫩苗葉煠熟水浸淘浄油鹽調食兎兒傘生山荒野中苗高二三尺許毎科初生一莖莖端生一層有七八葉毎葉分作四叉排生如傘盖状故以為名後於葉間攛生莖叉上開淡紅白花根似牛膝而疎短味苦㣲辛食法採嫩葉煠熟換水浸淘去苦味油鹽調食大蓬蒿生山野中莖似黄蒿莖色㣲帶紫葉似山芥菜葉長大極多花叉又似風花菜葉花叉亦多又似漏蘆葉却㣲短開碎瓣黄花苗葉味苦食法採葉煠熟水浸淘去苦味油鹽調食澤漆本草一名漆莖大㦸苗也苗高二三尺科叉生莖紫赤色葉似栁葉㣲細短開黄紫花状似杏花瓣頗長味苦辛性㣲寒無毒食法採葉及嫩莖煠熟水浸淘浄油鹽調食茴香一名蘹香子一名土茴香高三四尺莖麤傍有袴葉莖生袴葉上葉疎細如絲袴葉間分生叉枝梢頭開花花如盖黄色子如蒔蘿子味苦辛性平無毒食法採苗葉煠熟換水淘浄油鹽調食石芥生山谷中苗高一二尺葉似地棠菜葉濶短毎三葉或五葉攅生一處開淡黄花結黑子苗葉味苦㣲辣食法採嫩葉煠熟換水浸去苦味油鹽調食回回蒜一名水胡椒一名蠍虎草生水邉下濕地苗高一尺許葉似野艾蒿硬甚多花叉又似前胡葉頗大亦多花叉苗梢頭開五瓣黄花結穗如初生桑椹子大小色青味極辛辣其葉味甜食法採葉煠熟換水浸淘浄油鹽調食香茶菜生田野中莖方窊面四楞葉似薄荷葉㣲大抪莖對生梢頭出穗開粉紫花結蒴如蕎麥蒴㣲小葉味苦食法採葉煠熟水浸去苦味淘浄油鹽調食薔䕷一名刺䕷生荒野科條青色莖上多刺葉似椒葉長鋸齒又細背頗白開紅白花亦有千葉者味甜淡食法採芽葉煠熟換水浸淘浄油鹽調食山宜菜又名山苦菜生山野中苗初搨地生葉似薄荷葉大葉根兩傍有叉背白味苦食法採苗葉煠熟油鹽調食牛耳朶菜一名野芥菜生田野中苗高一二尺苗莖似萵苣色葉似牛耳朶形而小葉間分攛葶叉開白花結子如粟粒大葉味㣲苦辣食法採苗葉淘洗浄煠熟油鹽調食水芥菜生水邉苗高尺許葉似家芥菜葉極小色㣲淡緑葉多花叉莖亦細開小黄花結細短小角兒葉味㣲辛食法採苗葉煠熟水浸去辣氣淘洗過油鹽調食山苦蕒生山野中苗高二尺餘莖似萵苣葶節稠葉有三五花尖叉似花苦苣葉甚大開淡棠褐花表㣲紅味苦食法採嫩苗葉煠熟水淘去苦味油鹽調食水萵苣一名水波菜生水邉苗高一尺許葉似麥藍葉有細鋸齒兩葉對生毎兩葉間對叉又生兩枝梢間開花青白色結小青蓇葖如小椒粒大葉味㣲苦性寒食法採苗葉煠熟水淘浄油鹽調食驢駝布袋生山野中苗高二三尺葉似郁李子葉頗大光澤對生開白花結子如菉豆大兩兩莖生熟紅味甜食法採嫩芽煠熟淘去苦味油鹽調食苦蔴苗搨地叢生葉似山莧菜葉稍尖痩葉梢間開紫色長條花花似䑕菊性平味寒無毒食法採嫩葉煠熟淘去苦味油鹽調食春踏菜一名賽薺苗搨地生葉有鋸齒葉與薺菜一様梢間開小白花結實似菥蓂子味甘性温無毒食法採嫩葉煠熟淘去苦味油鹽調食蕎麥苗苗高二三尺許就地科叉生其莖色紅葉似杏葉軟㣲􅕏開小白花結實作三稜蒴兒味甘平性寒無毒食法採苗葉煠熟油鹽調食山黒豆生山野中苗似家黑豆毎三葉攅生一處居中大葉如菉豆葉傍兩葉似黑豆葉㣲圓開小粉紅花結角比家黑豆角極痩小其豆亦極細小味㣲苦食法採苗葉煠熟水淘去苦味油鹽調食黄豆苗苗高一二尺葉似黑豆葉大結角比黑豆角稍肥大葉味甘食法採苗葉煠熟油鹽調食採角豆煮食磨為麪赤小豆苗高一二尺葉似豇豆葉㣲團􅕏開花似豇豆花㣲小淡銀褐色結角比菉豆角頗大角皮色㣲白帶紅其豆有赤白黧色三種味甘酸性平無毒食法採葉煠熟水洗浄油鹽調食豆角煮食油子苗一名脂麻苗高三四尺莖方窊面四楞對節分生枝叉葉類蘇子葉長尖􅕏邉多花叉葉間開白花結蒴兒有子百十餘粒子味甘㣲苦性大寒無毒食法採葉煠熟水淘浄油鹽調食子炒熟食刀豆苗苗葉似豇豆葉肥大開淡粉紅花結角長其形似屠刀様味㣲淡食法採苗葉煠熟水淘浄油鹽調食豆角煮食嬾翠蒿生田野中苗高二尺許莖似黄蒿莖其葉碎小茸細如針翠緑色嫩葉㣲苦食法採嫩苗葉煠熟換水浸去蒿氣油鹽調食秋水角苗生田野中苗初就地拖秧而生後分莖叉苗長二尺餘葉似胡豆葉稍大開紫花結小角豆味苦食法採角煮食或収豆煮食皆可野菜博録卷二
