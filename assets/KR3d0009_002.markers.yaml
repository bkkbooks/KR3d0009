  - {type: variant, offset: 0, length: 3076, content: 欽定四庫全書野菜博錄卷二明鮑山撰草部野茴香生田野中苗初生搨地葉似蒿葉細小于葉間攛葶分生莖叉梢頭開黄花結細角有小黒子葉味苦食法採苗葉煠熟水浸淘去苦味油鹽調食野同蒿生荒野中苗高二三尺莖紫赤色葉㣲青黄色形似初生松針而茸細味苦食法採嫩苗葉煠熟換水浸淘浄油鹽調食前胡苗高一二尺青白色似斜蒿味甚香美葉似野菊葉痩細頗似山蘿蔔葉又似芸蒿開黲白花類蛇牀子花秋間結實根細青紫色味甘辛㣲苦性㣲寒無毒食法採葉煠熟換水浸淘浄油鹽調食透骨草一名天芝蔴生荒野中苗高三四尺莖方窊面四楞其莖脚紫對節分生莖叉葉似䕡蒿葉多花叉葉皆對生莖節間攅開粉紅花結子似胡麻子葉味苦食法採嫩苗葉煠熟水浸去苦味淘浄油鹽調食絞股藍生田野中延蔓而生葉似小藍葉短小軟薄邉有鋸齒淡緑色五葉攅生一處開小黄花又有白花者結子如豌豆大生青熟紫黑色葉味甜食法採葉煠熟水浸去邪味涎沫淘洗浄油鹽調食雞腸菜生荒野中苗高二尺許莖方紫色其葉對生葉似小灰菜葉㣲匾開粉紅花結碗子蒴兒葉味甜食法採苗葉煠熟水淘浄油鹽調食水蘇子生于濕地莖淡紫色對生莖叉葉亦對生葉似地𤓰葉而窄邉有花鋸齒三尖叉葉梢間開深黄色花葉味辛食法採苗葉煠熟油鹽調食鵝兒腸生田野水澤邉就地妥莖而生對節生葉葉似􅀈豆葉㣲薄葉間分生枝叉開白花結子似葶藶子葉味甜食法採苗葉煠熟油鹽調食六月菊生田野中苗高一二尺莖似鐵捍蒿莖葉似雞兒腸葉但長而澁又似馬蘭頭葉硬短梢葉間開淡紫花葉味㣲酸澁食法採葉煠熟水浸去邪味油鹽調食費菜生山野間苗高尺許葉似火燄草葉小頭頗齊上有鋸齒其葉抪莖生葉梢上開五瓣小尖淡黄色結五瓣紅小花蒴兒苗葉味酸食法採嫩苗葉煠熟淘去酸味油鹽調食紫雲菜生山野中苗高一二尺莖方紫色對節生叉葉似山小菜葉頗長抪梗對生葉間開淡紫花其葉味㣲苦食法採嫩苗葉煠熟水浸去苦味油鹽調食鴉蔥生田野中板葉尖長搨地而生葉似初生回回蒜葉其葉邉皆曲皺葉中攛葶上結小蓇葖後出白英味㣲辛食法採嫩葉煠熟油鹽調食水棘針苗又名山油子生田野中苗高一二尺莖方四楞對分莖叉葉亦對生葉似荆葉有軟鋸齒尖莖葉紫緑色開小紫碧花葉味辛辣㣲甜食法採苗葉煠熟水淘洗浄油鹽調食沙蓬又名雞爪菜生田野中苗高一尺餘初就地生後分莖叉莖有細線楞葉似獨掃葉窄厚莖梢間結小青子如粟粒小葉味甘性温食法採苗葉煠熟水浸淘浄油鹽調食川芎一名芎藭一名胡窮一名香果一名靡蕪一名薇蕪一名茳蘺苗葉似芹葉㣲細又似白芷葉亦細又如園荽葉叉開白花味辛甘性温無毒食法採葉煠熟換水浸去辛味淘浄油鹽調食防風一名銅芸一名茴草一名屏風根上黄色與蜀葵根相類梢紐短莖葉俱青緑色似青蒿葉濶大莖似茴香開細白花結實似胡荽子味甘辛性温無毒食法採嫩苗葉作菜茹煠食極爽口野生薑本草名劉寄奴生山野中莖似艾蒿長二三尺餘葉似菊葉痩尖開花白色結實黄白色作細筒子蒴兒葉味苦性温無毒食法採嫩葉煠熟水浸淘去苦味油鹽調食水辣菜生水邉濕地中苗高尺餘莖圓葉似鷄兒腸葉頭㣲齊短其葉抪莖生梢間出穗如黄蒿穗其葉味辣食法採嫩苗葉煠熟換水淘去辣氣油鹽調食生亦可食變豆菜生山野中其苗葉初作地攤科生葉似地牡丹葉極大五花叉鋸齒尖其後葉中分生莖叉梢葉頗小上開白花葉味甘食法採葉煠熟作成黄色換水淘浄油鹽調食委陵菜一名飜白菜苗搨地生分莖叉上有白毛葉類柏葉濶邉有鋸齒面青背白又類鹿蕨葉梢間開五瓣黄色葉味苦㣲辣食法採苗葉煠熟水浸淘浄油鹽調食麥藍菜生田野中莖葉俱深萵苣色葉似大藍稍葉小頗尖其葉抱莖對生毎一葉間攛生一叉莖叉梢頭開小肉紅花結蒴有子似小桃紅子苗葉味㣲苦食法採嫩苗葉煠熟水浸淘浄油鹽調食白蒿生荒野中苗高二三尺葉似細絲似初生松針色㣲青白稍似艾香味微辣食法採嫩苗葉煠熟換水浸淘浄油鹽調食龍膽草一名陵游一名草龍膽根類牛膝一本十餘莖黄白色宿根苗高尺餘葉似栁葉細短又似小竹開花如牽牛花青碧色似小鈴形様味苦性大寒無毒食法採葉煠熟換水浸淘去苦味油鹽調食猪牙菜一名角蒿一名莪蒿一名蘿蒿一名䕲蒿生田野中苗高一二尺莖葉如青蒿葉似邪蒿葉細又似蛇牀子葉頗壮梢間開花紅赤色亦似王不留行子味辛苦性寒無毒食法採嫩苗莖葉煠熟水浸去苦味油鹽調食款冬花一名槖吾一名顆東一名虎鬚一名菟奚一名氐冬莖青㣲帶紫色葉似葵葉大叢生又似石葫蘆葉開黄花根紫色葉味苦花味辛甘性温無毒食法嫩葉煠熟水浸淘去苦味油鹽調食萹蓄一名萹竹苗似石竹葉㣲濶嫩緑赤莖如釵股節間花出甚細淡桃紅色結小細子根如蒿根苗葉味苦性平無毒食法苗葉煠熟水浸淘浄油鹽調食薄荷一名鷄蘇莖方葉似荏子葉小頗細長開細碎黲白花其根經冬不死至春發苗味辛苦性温無毒食法採苗葉煠熟換水浸去辣味油鹽調食苜蓿苗高尺餘細莖分叉生葉似錦鷄兒花葉㣲長毎三葉攅生一處梢間開紫花結彎角兒中有子如黍米大味苦性平無毒食法採嫩苗葉煠熟油鹽調食漏蘆一名野蘭一名莢蒿根一名鹿驪根一名鬼油麻苗葉就地叢生葉似山芥菜葉又似白屈菜葉葉中攛葶上開紅白花根苗味苦醎性大寒無毒食法採葉煠熟水浸淘去苦味油鹽調食仙靈脾本草名滛羊藿俗呼三枝九葉草生山野中苗高二尺許莖似小豆莖極細堅葉似杏葉頗長近蒂皆一缺梢間開白色花亦有紫花俱細小葉味辛性寒無毒食法採嫩葉煠熟水浸去邪味淘浄油鹽調食桔梗一名利如一名房圖一名白藥一名梗草一名薺苨根如手指大黄白色春生苗莖高尺餘葉似杏葉長橢四葉相對生開花紫碧色頗似牽牛花秋後結子根葉味辛苦性㣲温有小毒食法採葉煠熟換水浸去苦味淘洗浄油鹽調食連翹一名異翹一名折根一名軹一名三亷苗高三四尺莖赤色葉如榆葉大邉㣲細鋸齒似金銀花葉梢開花黄色結房似梔子味苦性平無毒食法採嫩葉煠熟換水浸去苦味淘浄油鹽調食婆婆指甲菜生田野中作地攤科生莖細弱葉像女人指甲又似初生棗葉㣲薄細莖梢間結小花蒴苗葉味甘食法採嫩苗葉煠熟油鹽調食馬兜鈴一名雲南根一名土青木香苗如藤蔓葉如山藥葉厚大背白開黄紫花頗類枸杞花結實如鈴味苦性寒食法採葉煠熟用水浸去苦味淘浄油鹽調食後庭花一名鴈来紅人家園圃多種之葉似人莧葉其葉中心紅色又有黄色相間亦有通身紅色者亦有紫色者莖葉間結實比莧實㣲大其葉衆葉攅聚状如花朶其色嬌紅可愛故以名之味甜㣲澁性凉食法採苗葉煠熟水浸淘浄油鹽調食芸臺菜今處處有葉似菠菜葉菠菜葉下兩傍多兩叉開黄花結角似蔓菁角有子如小芥子大味辛性温無毒經冬根不死辟蠧食法採苗葉煠熟水浸淘洗油鹽調食鯽魚鱗苗高一二尺莖方茶褐色對分莖叉葉亦對生葉似鷄腸菜葉頗大又似桔梗葉㣲軟葉面紋皺梢間開粉紅花結子如小粟粒茶褐色葉味甜食法採葉煠熟水浸淘浄油鹽調食青莢兒菜生山野中苗高二尺許對生莖叉葉亦對生其葉面青背白鋸齒三叉葉脚葉花叉頗大状似荏子葉狹長尖􅕏莖葉梢間開五瓣小黄花衆花攅開形如穗状其葉味㣲苦食法採嫩苗葉煠熟換水浸淘去苦味油鹽調食苦蕒菜俗名老鸛菜生田野中人家園圃種者為家苦蕒脚葉似白菜葉抪莖生梢葉似鴉嘴形每葉間分叉攛葶如穿葉状梢間開黄花味㣲苦性冷無毒食法採苗葉煠熟水淘浄油鹽調食莙薘菜所在有之人家園圃中多種苗葉搨地生葉類白菜短葉莖亦窄葉頭稍團形状似麋匙様味醎性平寒㣲毒食法採苗葉煠熟洗浄油鹽調食山白菜生山野中苗葉似家白菜葉莖細長其葉尖大邉有鋸齒叉味甜㣲苦食法採苗葉煠熟水淘浄油鹽調食南芥菜人家園圃中本種苗初搨地生後攛葶叉葉似芥菜葉小有毛澁莖葉梢頭開淡黄花結小尖角兒葉味辛辣食法採苗葉煠熟水浸淘去澁味油鹽調食􆆥牛兒苗一名鬭牛兒苗生田野中就地拖秧生莖蔓細弱莖紅紫色葉似園荽葉痩開五瓣小紫花結青蓇葖兒上有一嘴甚尖銳如細錐子状葉味㣲苦食法採葉煠熟換水浸去苦味淘浄油鹽調食毛女兒菜生山中苗高一尺許葉似綿糸菜葉㣲尖又似兎尾兒葉小莖葉皆有白毛梢間開淡黄花如大黍味甘無毒食法採苗葉煠熟水浸淘浄油鹽調食山小菜生山野中科苗高二尺餘就地叢生葉似酸漿子葉窄小面有細紋脉邉有鋸齒色深緑又似桔梗葉頗長􅕏味苦食法採葉煠熟水浸淘去苦味油鹽調食小桃紅一名鳯仙花一名夾竹桃一名, SBCK: ''}
