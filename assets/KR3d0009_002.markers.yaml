  - {type: variant, offset: 3071, length: 2664, content: 蒳一名染指甲草今處處有之苗高二尺許葉似桃葉窄邉有細鋸齒開紅花結實形類桃様極小有子似蘿蔔子取之易迸北諍切散俗名急性子葉食法採苗葉煠熟水浸一宿做菜油鹽調食黄芪一名戴槮一名戴椹一名獨椹一名芰草一名蜀脂一名百本一名王孫根長二三尺獨莖叢生枝􅗰其葉扶疎羊齒状似槐葉小叉似蒺藜葉濶青白色開黄紫花如槐花結小尖角味甘性㣲温無毒食法採嫩苗葉煠熟換水浸淘去苦味油鹽調食威靈仙一名能消苗高一二尺莖方四稜莖多細茸白毛似栁葉邉有鋸齒似旋覆花葉毎層六七葉相對生排如車輪様有六七層花淺紫色或碧白色作穗似蒲臺子似菊花頭結實青色葉味苦性温無毒食法採葉煠熟換水浸去苦味淘浄油鹽調食地花菜一名墓頭灰生山野中苗高尺餘葉似野萄花葉窄細又似䑕尾草葉亦痩細梢葉間開五瓣小黄花其葉味㣲苦食法採葉煠熟水浸淘洗浄油鹽調食耬斗菜生山野中小科苗就地叢生苗高一尺許莖梗細弱葉似牡丹葉小其頭頗團味甜食法採葉煠熟水浸淘浄油鹽調食青杞一名蜀羊泉一名羊泉一名羊􅀈一名漆姑生田野中苗高二尺餘葉似菊葉稍長開紫色花子類枸杞子生青熟紅根如逺志無心有槮葉味苦性㣲寒無毒食法採嫩葉煠熟水浸去苦味淘浄油鹽調食車輪子即車前子一名芣苢一名蝦蟇衣處處有之初生苗葉抪地如匙面累年者長尺餘似玉簮花葉大葉叢中攛葶三四莖作長穗如䑕尾花甚密結實如葶藶子赤黑色葉味甘性寒無毒食法採嫩苗葉煠熟水浸去涎沫淘浄油鹽調食金盞菜一名地冬𤓰菜生田野中苗高二三尺莖初㣲赤有線路葉似綿栁葉㣲厚抪莖生莖葉稠密開花紫色黄心其葉味甘㣲鹹食法採苗葉煠熟水淘浄油鹽調食泥胡菜生田野中苗高一二尺莖梗繁多葉似水芥菜葉頗大花叉甚深又似風花菜葉却比短小葉中攛葶分生莖叉梢間開淡紫花似刺薊花苗葉味辣食法採嫩苗葉煠熟水浸淘浄油鹽調食狶薟一名粘糊菜一名火杴草苗高三四尺葉似金稜銀線素根紫稭莖叉對節生莖葉頗類蒼耳紋脉豎直梢葉間開花深黄色又有一種苗葉似芥葉尖狹開花如菊結實頗似鶴蝨科苗味苦性寒有毒食法採嫩葉煠熟水浸去苦味淘浄油鹽調食澤瀉一名水䓠一名水瀉一名芒芋一名鵠瀉苗葉似牛舌草紋脉豎直葉叢中攛葶對分莖叉有線榜梢間開三瓣小白花結細子味甘葉味㣲鹹俱無毒食法採嫩葉煠熟水浸淘浄油鹽調食旋覆花一名戴椹一名金沸草一名盛椹一名金錢花苗多近水傍初生大如紅花葉無刺苗長二三尺葉似栁葉稍寛大莖細如蒿􅗰開花如菊花如銅錢大深黄色花味鹹甘性温㣲冷有毒葉味苦性凉食法採葉煠熟水浸去苦味淘浄油鹽調食風花菜生田野中苗高二尺餘葉似芥菜葉痩長又多花叉梢間開黄花如菜花味辛㣲苦食法採嫩苗葉煠熟換水後淘去苦味油鹽調食花蒿生荒野中苗葉就地叢生葉長三四寸四散分垂葉似獨掃葉長硬其頭頗齊㣲有毛澁味㣲辛食法採葉煠熟水浸淘浄油鹽調食獾耳菜生平野中苗長尺餘莖多枝叉其莖上有細線楞葉似竹葉短小亦軟又似萹蓄葉頗濶大又尖莖葉俱有㣲毛開小黲白花結細子苗葉味甘食法採嫩苗葉煠熟水浸淘浄油鹽調食兎兒傘生山荒野中苗高二三尺許毎科初生一莖莖端生一層有七八葉毎葉分作四叉排生如傘盖状故以為名後於葉間攛生莖叉上開淡紅白花根似牛膝而疎短味苦㣲辛食法採嫩葉煠熟換水浸淘去苦味油鹽調食大蓬蒿生山野中莖似黄蒿莖色㣲帶紫葉似山芥菜葉長大極多花叉又似風花菜葉花叉亦多又似漏蘆葉却㣲短開碎瓣黄花苗葉味苦食法採葉煠熟水浸淘去苦味油鹽調食澤漆本草一名漆莖大㦸苗也苗高二三尺科叉生莖紫赤色葉似栁葉㣲細短開黄紫花状似杏花瓣頗長味苦辛性㣲寒無毒食法採葉及嫩莖煠熟水浸淘浄油鹽調食茴香一名蘹香子一名土茴香高三四尺莖麤傍有袴葉莖生袴葉上葉疎細如絲袴葉間分生叉枝梢頭開花花如盖黄色子如蒔蘿子味苦辛性平無毒食法採苗葉煠熟換水淘浄油鹽調食石芥生山谷中苗高一二尺葉似地棠菜葉濶短毎三葉或五葉攅生一處開淡黄花結黑子苗葉味苦㣲辣食法採嫩葉煠熟換水浸去苦味油鹽調食回回蒜一名水胡椒一名蠍虎草生水邉下濕地苗高一尺許葉似野艾蒿硬甚多花叉又似前胡葉頗大亦多花叉苗梢頭開五瓣黄花結穗如初生桑椹子大小色青味極辛辣其葉味甜食法採葉煠熟換水浸淘浄油鹽調食香茶菜生田野中莖方窊面四楞葉似薄荷葉㣲大抪莖對生梢頭出穗開粉紫花結蒴如蕎麥蒴㣲小葉味苦食法採葉煠熟水浸去苦味淘浄油鹽調食薔䕷一名刺䕷生荒野科條青色莖上多刺葉似椒葉長鋸齒又細背頗白開紅白花亦有千葉者味甜淡食法採芽葉煠熟換水浸淘浄油鹽調食山宜菜又名山苦菜生山野中苗初搨地生葉似薄荷葉大葉根兩傍有叉背白味苦食法採苗葉煠熟油鹽調食牛耳朶菜一名野芥菜生田野中苗高一二尺苗莖似萵苣色葉似牛耳朶形而小葉間分攛葶叉開白花結子如粟粒大葉味㣲苦辣食法採苗葉淘洗浄煠熟油鹽調食水芥菜生水邉苗高尺許葉似家芥菜葉極小色㣲淡緑葉多花叉莖亦細開小黄花結細短小角兒葉味㣲辛食法採苗葉煠熟水浸去辣氣淘洗過油鹽調食山苦蕒生山野中苗高二尺餘莖似萵苣葶節稠葉有三五花尖叉似花苦苣葉甚大開淡棠褐花表㣲紅味苦食法採嫩苗葉煠熟水淘去苦味油鹽調食水萵苣一名水波菜生水邉苗高一尺許葉似麥藍葉有細鋸齒兩葉對生毎兩葉間對叉又生兩枝梢間開花青白色結小青蓇葖如小椒粒大葉味㣲苦性寒食法採苗葉煠熟水淘浄油鹽調食驢駝布袋生山野中苗高二三尺葉似郁李子葉頗大光澤對生開白花結子如菉豆大兩兩莖生熟紅味甜食法採嫩芽煠熟淘去苦味油鹽調食苦蔴苗搨地叢生葉似山莧菜葉稍尖痩葉梢間開紫色長條花花似䑕菊性平味寒無毒食法採嫩葉煠熟淘去苦味油鹽調食春踏菜一名賽薺苗搨地生葉有鋸齒葉與薺菜一様梢間開小白花結實似菥蓂子味甘性温無毒食法採嫩葉煠熟淘去苦味油鹽調食蕎麥苗苗高二三尺許就地科叉生其莖色紅葉似杏葉軟㣲􅕏開小白花結實作三稜蒴兒味甘平性寒無毒食法採苗葉煠熟油鹽調食山黒豆生山野中苗似家黑豆毎三葉攅生一處居中大葉如菉豆葉傍兩葉似黑豆葉㣲圓開小粉紅花結角比家黑豆角極痩小其豆亦極細小味㣲苦食法採苗葉煠熟水淘去苦味油鹽調食黄豆苗苗高一二尺葉似黑豆葉大結角比黑豆角稍肥大葉味甘食法採苗葉煠熟油鹽調食採角豆煮食磨為麪赤小豆苗高一二尺葉似豇豆葉㣲團􅕏開花似豇豆花㣲小淡銀褐色結角比菉豆角頗大角皮色㣲白帶紅其豆有赤白黧色三種味甘酸性平無毒食法採葉煠熟水洗浄油鹽調食豆角煮食油子苗一名脂麻苗高三四尺莖方窊面四楞對節分生枝叉葉類蘇子葉長尖􅕏邉多花叉葉間開白花結蒴兒有子百十餘粒子味甘㣲苦性大寒無毒食法採葉煠熟水淘浄油鹽調食子炒熟食刀豆苗苗葉似豇豆葉肥大開淡粉紅花結角長其形似屠刀様味㣲淡食法採苗葉煠熟水淘浄油鹽調食豆角煮食嬾翠蒿生田野中苗高二尺許莖似黄蒿莖其葉碎小茸細如針翠緑色嫩葉㣲苦食法採嫩苗葉煠熟換水浸去蒿氣油鹽調食秋水角苗生田野中苗初就地拖秧而生後分莖叉苗長二尺餘葉似胡豆葉稍大開紫花結小角豆味苦食法採角煮食或収豆煮食皆可野菜博録卷二, SBCK: ''}
