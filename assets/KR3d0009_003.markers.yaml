  - {type: variant, offset: 0, length: 3191, content: 欽定四庫全書野菜博録卷三明鮑山撰木部茶樹柯一名茗一名荈樹柯叢生大小類枝子葉春初生芽作細茶葉長半寸餘作麤茶味苦性寒無毒食法採嫩葉焙作茶烹去苦味二三次水淘浄油鹽薑醋調食木槿樹一名舜如葵花淡紅色五葉成一花朝開暮斂亦有千葉者性平無毒葉味甜食法嫩葉煠熟冷水淘浄油鹽調食龍栢芽生山野中此木若年久亦大葉似初生橡櫟葉短小葉味㣲苦食法採芽葉煠熟換水浸淘浄油鹽調食木葛生山野中樹高丈餘葉似杏葉團味㣲甜食法採葉煠熟水浸淘浄油鹽調食凍青樹枝葉似桂樹極茂盛凌冬不凋開白花結子如豆粒大青黑色葉味苦食法採芽葉煠熟水浸去苦味淘浄油鹽調食月芽樹又名仍芽莖似槐條葉似歪頭菜葉短硬味甘㣲苦食法採嫩葉煠熟水浸淘浄油鹽調食白楊樹處處有之此木高大皮白色葉似梨葉圓肥背白葉邉鋸齒状味苦性平無毒食法採嫩葉煠熟作成黄色換水淘去苦味洗浄油鹽調食木欒樹生山谷中樹高丈餘葉似楝葉寛大稍薄開淡黄花結薄殻中有子大如豌豆烏黑色人多摘取串作數珠葉味淡甜食法採嫩芽葉煠熟換水浸淘油鹽調食老葉兒樹生山野中高六七尺葉似李樹葉而長邉有毛葉味甘㣲澁食法採葉煠熟水浸去澁味淘浄油鹽調食青楊樹生山野中樹高大葉似白楊樹葉狹小青色皮亦青色葉味㣲苦食法採葉煠熟水浸作成黄色淘浄油鹽調食椿樹芽一名樗樹芽係二種椿芽葉香紫色樗芽疎而臭氣不可食椿芽㣲苦回味性熱無毒食法採芽葉煠熟水浸淘浄油鹽調食黄櫨生山野中木黄色枝莖紫赤色葉似杏葉圓大味苦性寒無毒食法採嫩芽煠熟換水淘去苦味油鹽調食檀樹芽生山野中樹高一二丈葉似槐葉長大開淡粉紫花葉味苦食法採芽葉煠熟浸去苦味淘浄油鹽調食山茶科生山野中科高四五尺枝梗灰白色葉似皂莢葉圓四五葉攅生一處葉甚稠味苦食法採葉煠熟水浸淘浄油鹽調食或蒸曬乾作茶煮飲可􅀢樹生山谷中樹高丈餘葉似槐葉大却軟薄似檀樹葉薄小開淡紅色花結子如菉豆大熟則黄茶褐色其葉味甜食法採葉煠熟水浸淘浄油鹽調食臭竹樹生山野中樹甚高大葉似楸葉厚花叉似拐棗葉亦大其葉面青背白味甜食法採葉煠熟水浸去邪臭氣味油鹽調食回回醋一名淋樸􅈪生山野中樹高丈餘葉似椿葉厚太邉有鋸齒或三葉或五葉排生一莖開白花結子大如豌豆熟紅紫色味酸葉味㣲酸食法採葉煠熟水浸去酸味油鹽調食用子調和百味如醋槭樹芽生山野間木高一二丈葉似野葡萄葉五花尖叉又似絲𤓰葉却小淡黄緑色開白花葉味甜食法採葉煠熟水浸作成黄色換水淘浄油鹽調食女兒茶一名牛李子生山野中科條高五六尺葉似郁李子葉長大稍尖葉色光滑㣲黄緑結子如豌豆大生青熟黑茶褐色葉味淡㣲苦食法採嫩葉煠熟水浸淘浄油鹽調食白槿樹生山谷中樹高五七尺葉似茶甚濶大光潤開白花葉味苦食法採嫩葉煠熟換水浸去苦味油鹽調食烏稜樹生山野中樹高丈餘葉似省沽油葉背㣲白開白花結子如梧桐子大生青熟紅葉味苦食法採葉煠熟換水浸去苦味作過淘洗浄油鹽調食刺楸樹生山野中樹高大皮色蒼白上有黄白斑枝梗多有大刺葉似楸葉薄味甘食法採嫩葉煠熟水浸淘浄油鹽調食黄絲藤生山野間形類葛條葉似山格刺葉小背㣲白邉有細鋸齒味甜食法採葉煠熟水浸淘浄油鹽調食山格刺生山野間葉似白槿樹葉短尖味甘食法採葉煠熟水浸作成黄色換水淘浄油鹽調食報馬樹生山野中枝似桑條葉似青檀葉大邉有花叉葉味甜食法採葉煠熟水淘浄油鹽調食硬葉煠熟水浸作成黄色淘去涎沫油鹽調食堅莢樹生山谷中樹枝堅勁可以作棒皮色烏黑對分枝叉葉似拐棗葉却大色淡緑亦對生開黄花結小紅子葉味苦食法採嫩葉煠熟水浸去苦味淘浄油鹽調食穁芽樹葉似冬青葉㣲長開白花結青白子其葉味甜食法採嫩葉煠熟水淘浄油鹽調食白辛樹生山野間樹高丈許葉似青檀樹葉頗長色㣲淡緑又似月芽樹葉大色亦差淡葉味甘㣲澁食法採葉煠熟水浸淘去澁味油鹽調食椵樹樹甚高大其木細膩枝叉對生葉似木槿葉長大㣲薄色頗淡緑皆作五花椏叉邉有鋸齒開黄花結子如豆粒大色青白葉味苦食法採嫩葉煠熟水浸去苦味淘洗浄油鹽調食臭􅵮科條高四五尺葉似杵𤓰葉尖􅕏又似金銀花葉亦尖􅕏五葉攅生如一葉開花白色其葉味甜食法採葉煠熟水浸淘浄油鹽調食椒樹一名川椒本草名蜀椒生蜀郡川谷間高四五尺枝莖有刺葉似薔䕷葉堅硬結實無花葉間如豆顆皮紫赤色中有小黑子味辛性温大熱有小毒食法採葉煠熟換水浸淘浄油鹽調食雲桑生山野中樹枝葉皆類桑但葉頭有花叉如雲開細花青黄色葉味㣲苦食法採嫩葉煠熟換水浸淘去苦味油鹽調食或蒸曬作茶亦可馬魚兒條俗名山皂角生荒野中葉似初生刺䕷花葉而小枝梗色紅有刺似棘針㣲小葉味甘㣲酸食法採葉煠熟水浸淘浄油鹽調食省沽油一名珍珠花科條似荆條圓枝叉對生葉似驢駞布袋葉大又似葛藤葉小毎三葉攅生一處開白花似珍珠色葉味甘㣲苦食法採葉煠熟水浸淘浄油鹽調食兜櫨樹一名壊香葉似回回醋樹葉薄窄又似花楸樹葉却少花叉葉皆對生味苦食法採嫩芽葉煠熟水浸去苦味淘洗油鹽調食花楸樹生山野中樹高大葉似回回醋葉㣲薄邉有鋸齒叉葉味苦食法採芽葉煠熟換水浸去苦味淘洗浄油鹽調食椋子樹樹有大者初生作科條状類荆條對生枝叉葉似柿葉薄小兩葉對生開白花結子細圓如豌豆大生青熟黑色味甘鹹性平無毒葉味苦食法葉煠熟水浸淘去苦味洗浄油鹽調食垂栁有二種枝葉上生為楊枝葉下垂為栁其樹高大各處多有性寒味苦無毒食法採嫩芽葉煠熟淘去苦味油鹽調食黄楝樹葉似初生椿樹葉極小又似楝葉㣲帶黄色開花紫赤色結子如豌豆大生青熟紫赤色味苦食法採嫩芽葉煠熟換水浸去苦味油鹽調食夜合樹一名合歡一名合昏木似梧桐枝甚柔弱葉似皂莢葉又似槐葉極細密毎一風来輒似相解了不相牽綴其葉至暮而合花發紅白色瓣上若絲茸然散垂結實作莢子極薄細味甘性平無毒食法採嫩葉煠熟水浸淘浄油鹽調食槲若一名槲木一名斗樹生山谷中樹頗高大葉似桑樹葉其味甘性平無毒食法採嫩葉煠熟油鹽調食黄蘗一名蘗木一名子蘗生山谷中樹高數丈葉似茱茰葉經冬不凋皮外白色裏黄色其味苦性寒無毒食法採嫩葉煠熟浸去苦味油鹽調食蜜䝉一名寒不凋生山谷中樹頗高大葉似冬青樹葉又似橘葉而厚背白色有細毛味甘平性㣲寒無毒食法採嫩葉煠熟油鹽調食菴摩勒一名餘耳生山谷中其樹高大枝條甚軟葉青細蜜朝開暮合花著條而生如粟粒大味苦性寒無毒食法採嫩葉煠熟水浸去苦味油鹽調食杜蘭一名林蘭生深山中樹高數仞葉似菌桂葉有二道縱文其味苦性寒無毒食法採嫩葉煠熟油鹽調食白棘一名棘鍼一名棘刺生山中柯莖多刺葉似酸棗葉又似赤刺葉開花結實如棗形味辛性寒無毒食法採嫩葉煠熟油鹽調食海桐皮生山谷中樹高二三丈葉如手大味苦性平無毒食法採嫩葉煠熟水淘浄油鹽調食落鴈木生深山中其科苗作蔓纒繞大木葉似茶葉不結花實味平温無毒食法採嫩葉煠熟油鹽調食沒藥樹生深山谷中其樹頗極高大葉似楓樹葉味苦性平無毒食法採嫩葉煠熟水浸去苦味油鹽調食南藤一名丁公藤一名象豆生山谷中延石壁古木纒遶其苗如馬鞭有節紫褐色葉似杏葉短尖味辛烈無毒食法採嫩苖葉煠熟油鹽調食乾漆一名地節一名黄芝生山中樹高二丈餘皮白色葉似椿樗葉花似槐花結子如牛蒡子其味辛温無毒食法採嫩葉煠熟油鹽調食木天蓼一名蓬萊金蓮枝生山谷中樹高數丈餘葉似枝子花葉開花似小蓮花其味辛温有毒食法採嫩葉煠熟油鹽調食釣藤一名鈎草藤生山谷中莖上有刺如釣葉似通山藤葉味㣲寒無毒食法採嫩苗葉煠熟水浸淘浄油鹽調食五倍子樹一名文蛤一名百蟲倉生山谷中葉似椿樹葉無花結實如拳内多小蟲其味苦酸性平無毒食法採嫩葉煠熟油鹽調食獨揺樹一名水榆一名高飛一名蒲楊生山谷中樹頗高大葉有三角其味苦無毒食法採嫩葉煠熟水浸去苦味油鹽調食伏牛花一名隔虎刺生山谷中樹頗高大葉似黄蘗葉梗多刺莖赤色花開淡黄色作穗似小杏子味苦甘無毒食法採嫩葉煠熟油鹽調食杉木一名杉材一名杉菌生深谷中樹頗高大勁直葉附枝生若刺葉似刺柏葉又似榧樹葉味苦性温無毒食法採嫩苗葉煠熟水浸去苦味油鹽調食接骨木一名木蒴藋生深谷中樹高大丈餘葉似水芹葉開花似陸英樹花其味甘苦性平無毒食法採嫩葉煠熟油鹽調食藩籬枝一名軟枝鬚其本不甚高大枝梗俱帶軟葉似枸杞葉性平味寒稍有毒食法採嫩葉煠熟油鹽調食臘梅花樹枝條類李樹葉似桃葉寛大㣲厚紋脉甚細開淡黄花味甘㣲苦食法採花煠熟水浸淘浄油鹽調食馬棘生山野間科高五七尺葉似新生皂莢葉却小稍間開粉紫花味甜食法採花煠熟水浸淘浄油鹽調食野菜博録卷三, SBCK: 云}
