body:
  text: 野菜博錄卷四明鮑山撰木部藤花樹生荒野中葉似椿葉小淺緑黄色枝間開淡紫花味甘食法採花煠熟水淘淨油鹽調食或㣲焯過曬乾煠食亦佳楸樹生山野中樹髙大木可作琴瑟葉似梧桐葉薄小葉梢有三尖叉開白花味甜食法採葉煠熟油鹽調食或曬乾煠食炒食皆可欛齒花本草一名錦雞兒花葉似枸杞子葉小每四葉聚生一處枝梗亦似枸杞有小刺開黄花狀類雞冠結小角兒味甜食法採花煠熟油鹽調食青舍子條生山谷間科條㣲帶柿黄色葉似胡枝子葉光俊㣲尖稍間開淡粉紫花結子似枸杞子㣲小生青熟紫黒色食法採摘其子紫熟者食之蕤核樹俗名㽔李子生函谷川谷及巴西河東皆有今古崤闗西茶店山谷間亦有之其木髙四五尺枝條有刺葉細似枸杞葉而尖長又似桃葉而狹小亦薄花開白色結子紅紫色附枝莖而生狀類五味子其核仁味甘性温㣲寒無毒其味甘酸食法摘取其果紅紫色熟者食之白棠子樹一名沙棠梨兒生荒野中枝梗似棠棃樹㣲小葉似棠棃葉窄小白色結子如豌豆大味酸甜食法摘熟子食之野木𤓰一名杵𤓰生山野中蔓延妥附草木上葉似黒豆葉㣲小光澤四五葉攅生一處結𤓰如肥皁大味甜食法摘嫩𤓰換水煮食熟時亦可摘食野櫻桃生山谷中樹髙五六尺葉似李葉更尖開白花似李子花結實比櫻桃又小熟色鮮紅味甘㣲酸食法摘取其果紅熟者食之軟棗一名丁香柿又名牛乳柿又呼羊矢棗爾雅謂之梬其樹枝葉皆類柿結實甚小乾熟則紫黒色味甘性温無毒多食動風發冷風咳嗽食法採取軟棗成熟者食之水茶臼科條髙四五尺莖上有小刺葉似大葉胡枝子葉有尖開黄白花結果如杏大狀似甜𤓰瓣而色紅味甜酸食法果熟紅時摘取食之老婆布䩞生山谷中科條淡蒼黄色葉似匙頭様色嫩緑光俊又似山格刺葉却小味甘食法採葉煠熟水浸作過淘淨油鹽調食櫨子樹生山野中多有之樹髙丈許葉似冬青樹葉稍濶厚背色㣲黄葉形又類棠梨葉但厚結果似木𤓰稍團味酸甜㣲澁性平食法果熟時摘食之多食損齒及筋木𤓰生山野中處處有之樹枝狀似奈花深紅色葉似柿葉㣲小厚爾雅謂之楸其實形如小𤓰似栝樓小兩頭尖長淡黄色味酸性温無毒食法採熟木𤓰食之多食亦不益人實棗兒樹本草名山茱茰生山野中葉似榆葉寛團紋粗開淡黄白花結實如酸棗大兩頭尖長赤色乾時皮薄味酸性平㣲温無毒食法採紅熟棗食之孩兒拳樹本草名莢蒾生山野中樹小葉似杏葉頗大薄澁枝葉間開黄花結子共為一攅生青熟赤味甘㣲苦性平無毒食法採紅熟子食之或煮枝汁少加米作粥食甚美酸棗樹爾雅謂之樲棗生山野間木似棗樹皮細莖多刺葉似棗葉㣲小結實比棗圓小紫紅色味酸性平無毒食法採棗為果未熟時煮食亦可橡子樹本草橡實櫪子也生山野間樹髙大葉似果葉大開黄花結實有梂裹其實味苦澁性㣲温無毒食法取子換水浸煮數次淘去澁味蒸極熟食之厚腸胃肥健人不饑石岡橡生汜水西茶店山谷中其木高丈許葉似橡櫟葉極小而薄邉有鋸齒而少花叉開黄花結實如橡斗而極小味澁㣲苦食法採實換水煮五七水令極熟食之荆子一名牡荆實一名小荆實一名黄荆科條生枝莖堅勁對生枝又葉似麻葉疎短開花作穗色粉紅㣲帶紫結實大如黍粒黄黑色味苦性温無毒食法採子換水浸淘去苦味曬乾搗磨為麵拐棗生密縣梁家衝山谷中葉似楮葉無花叉却更尖而面多紋脉邊有細鋸齒開淡黄花結實狀似生薑有叉細短深茶褐色故名拐棗味甜食法採取拐棗成熟者食之山梨兒一名金剛樹又名鐵刷子生鈞州山野中科條髙三四尺枝條上有小刺葉似杏葉頗團小開白花結實如葡萄顆大熟則紅黄色味甘酸食法採果食之落霜紅生山野間髙四五尺葉似土欒葉開白花結子如菉豆大生青熟紅味甜食法採紅熟子食之木桃兒樹生中牟土山間樹髙五尺餘枝條上聚為疙瘩狀類小桃兒極堅葉似青檀葉梢間開淡紫花結子似梧桐子熟則淡銀褐色味甜食法採子熟者食之無花果生山野中今人家園圃中亦栽葉形如葡萄葉頗長硬厚梢作三叉枝葉間生果初則青小熟大如李子似紫茄色味甜食法採熟果食之土欒樹生山野中木堅勁可作秤稈葉似木葛葉㣲狹厚背白㣲毛開淡黄花結小子如豌豆而匾生青熟紫黑色味甘食法採紫熟子食之欒荆一名栘楊生山谷中樹髙大少枝梗似榆木葉冬不凋開花紫白色結子似麻子大味苦性平有毒食法子熟時摘食䑕李一名牛李一名䑕梓一名趙李一名皂李一名烏程槎生田野間枝葉俱似李子其味苦性㣲寒無毒食法李子熟時摘食野葡萄俗名烟黒生荒野中莖葉實俱似家葡萄者細小實亦稀疎味酸食法採葡萄紫熟者食亦中釀酒飲槐樹芽本草有槐實葉大而黒者名櫰槐晝合夜開者名守宫槐葉細青緑者謂之槐開黄花結實似豆角狀味苦酸鹹性寒無毒食法採芽煠熟淘去苦味油鹽調食採花炒食欒華木一名賽木槿生山谷中樹頗髙大樹葉俱似木槿樹葉開花似槐花黄色味苦性寒無毒食法採花嫩葉煠熟油鹽調食房木一名辛矧一名辛夷一名侯木生山中樹髙數丈葉似柿葉而狹花似著毛花結實似小桃色白其性平温無毒食法採取花嫩葉煠熟水浸去邪味油鹽調食杏樹本草有杏仁核仁處處有之樹髙丈餘葉頗圓稍帶紅色結實金黄者為美味甘苦性温冷利有毒得火良食法採葉煠熟以水浸漬作成黄色換水淘淨油煠食杏黄熟時摘取食沙果子樹即花紅人家園圃亦多栽種樹髙丈餘葉似櫻桃葉深緑色開粉紅花瓣㣲長不尖結實似李甚大味甘㣲酸食法摘取紅熟果食之嫩葉亦可煠熟油鹽調食皂莢樹生山野間葉似槐葉長尖枝間多刺結實有數種小者為猪牙皂莢有長五七寸者用之當以肥膩者為佳味醎性温有小毒食法採嫩芽煠熟水浸淘淨油鹽調食採子炒舂令軟煮熟以糖漬之食青檀樹生山野間皮紋細薄葉類棗葉㣲尖背白面澁開白花結青子如梧桐子大葉味酸澁實味甘酸食法採葉煠熟水浸淘去酸味油鹽調食子熟時摘食之桃樹本草有桃核仁處處有之髙丈餘葉似栁葉濶大有紋脈開花紅色結實桃核仁味苦甘性平無毒食法採嫩葉煠熟水浸作成黄色換水淘淨油鹽調食棗樹本草有大棗樹髙一二丈葉似酸棗葉大光澤葉間開青黄色小花結棗味甘美性平無毒食法採嫩葉煠熟水浸作成黄色淘淨油鹽調食婆婆枕頭生鈞州密縣山坡中科條髙三四尺葉似櫻桃葉長開黄花結子如菉豆大生則青熟紅色味甘食法採熟紅子食之青岡樹枝葉條榦皆類橡櫟但葉色頗青花叉味苦性平無毒食法採嫩葉煠熟以水浸漬作成黄色換水淘洗淨油鹽調食枸杞一名杞根一名地輔一名仙人杖一名地仙苗根名地骨莖榦髙三五尺有小刺百葉如石榴葉軟薄開小紅紫花結實熟則紅色味㣲苦性寒子㣲寒無毒食法採子熱水淘淨油鹽調食栢樹本草曰栢實生山野中葉及實皆味苦性平無毒食法列仙傳云赤松子食栢子齒落更生採葉換水浸去苦味初食苦澁入密或棗肉和食尤好柘樹處處有之其木堅勁皮紋細密枝條有刺葉比桑葉小而薄色黄淡葉梢三叉綿柘刺少枝葉間結實狀如楮桃熟有紅蘂味甘㣲苦柘木味甘性温無毒食法採嫩葉煠水浸去邪味油鹽調食楮桃樹一名楮實所在有之葉似葡萄葉作瓣叉上多毛澁而有子者佳桃如彈大青緑色後變紅成熟浸洗去穰取中子實葉俱味甘性寒凉無毒食法採葉煠爛水浸握乾作餅食或取熟紅楮山檾樹生密縣梁家衝山谷中樹髙丈餘葉似初生蜀葵又似芙蓉葉毎葉兩傍却又有角义開白花結實類枸杞子大熟時㣲黒色味甘酸其葉苦食法採葉煠熟水浸去苦味淘洗淨油鹽調食木羊角科一名羊桃枓一名小桃花生荒野中紫莖葉似初生桃葉光俊色㣲帶黄枝間開紅白花結角似豇豆角甚細而尖􅕏毎兩角並生一處味㣲苦酸食法採嫩梢葉煠熟水浸淘淨油鹽調食金櫻子處處有之葉枝叢生似薔薇有刺開白花夏結實實上亦有小刺黄赤色似小石榴形味酸澀性平無毒食法採其嫩葉油鹽調食子熟摘賽苦茗一名如茶一名子生山谷中樹髙大葉似大葉茶又似枝子葉開花白色如薔薇花其味苦性寒無毒食法採嫩葉煠熟油鹽調食子熟摘食賣子木出嶺南邛州山谷中樹頗大其葉似柿四五月開碎花百十枝隨花更生子如椒目在花瓣中黒而光味甘性寒無毒食法採其子與嫩葉油鹽調食皮磨麵子熟摘南燭一名猴藥一名男續一名後卓一名惟那木一名染菽生山谷中樹頗髙大葉似苦棟樹葉其味苦性平無毒食法採嫩葉煠熟油鹽調食子熟摘食石榴垂垂如贅瘤也廣雅謂之若榴舊云漢張騫使西域得塗林安石國榴種以歸故名安石榴今處處有之其葉似枸杞葉長㣲尖緑色花紅實繁性温無毒食法採其嫩葉煮熟油鹽調食榴果熟時摘取食之松樹樹有三種一名栝子松一名踢牙松一名雲南五針松其葉後凋有三針五針之别二三月抽􅅋生花色如金粉結實如茘枝狀毎秋老則子長鱗裂然子有大小山松如麻子小而扁不及塞上者佳也味甘性温無毒食法採花煠熟去其苦味和麵油鹽調食之吉利子樹生山野中髙五六尺葉似櫻桃葉小開五瓣碧玉色小尖花結子如椒粒大兩兩並生熟紅色味甜食法摘熟子食之文冠花出吴楚閩越中葉似榆葉窄小花似藤花色白穂甚長結實如柚而大形有數瓣中有子二十餘顆瓤色㣲黄軟爛可食其葉性凉味苦食法採嫩葉淘去苦味油鹽調食子熟食瓤棠梨樹生荒野中葉似蒼术葉亦有團葉者有三叉葉者葉邊皆有鋸齒葉色頗黲白開白花結棠梨如小楝子大味甘酸花葉味㣲苦食法採花煠熟食或曬乾磨麵作燒餅食亦可採嫩葉煠熟水浸淘淨油鹽調食或蒸曬作茶亦可旁其樹生似茶檟髙丈餘葉㣲圓而尖面青背白有紋四五月開細花黄白色六月結實如冬青子生青熟紫味辛温無毒食法採嫩葉煠食亦可炙碾煎飲代茗子熟摘榆樹處處皆有樹頗高大有赤白二種未發葉時枝條間先生莢似錢而小色白成串俗呼榆錢後方生葉類山茱茰葉而長尖味甘平滑利無毒食法採取嫩葉淘淨煠食皮可磨麵桑椹樹本草有桑根白皮有黒白二種桑之精英盡在其椹味甘性寒無毒桑椹味甘性暖食法採葉嫩老皆可煠食皮炒乾磨麵可食女貞實諸處時有葉似冬青葉四時茂盛凌冬不凋其實九月熟黒似牛李子味苦性平無毒食法採子煮熟可食老兒樹生山野中高五六尺葉似櫻桃葉小開五瓣蒼玉色小尖花結子如椒粒大兩並生熟紅色味甜食法採花煠熟食之野菜博録卷四
